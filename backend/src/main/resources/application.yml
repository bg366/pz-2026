spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/krakow_parking
    username: parking_user
    password: parking_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 60s

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

security:
  jwt:
    secret: ${JWT_SECRET:krakow-parking-local-jwt-secret-change-in-production}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

# Paynow sandbox integration (optional — leave empty to use local payment simulation)
# Register at https://panel.sandbox.paynow.pl to get credentials
paynow:
  api-key: ${PAYNOW_API_KEY:}
  signature-key: ${PAYNOW_SIGNATURE_KEY:}
  api-url: ${PAYNOW_API_URL:https://api.sandbox.paynow.pl}
  continue-url: ${PAYNOW_CONTINUE_URL:http://localhost:3000/rezerwacje}
